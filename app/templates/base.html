<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Health Interoperability Demo{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary:    #1E40AF;
      --color-primary-light: #3B82F6;
      --color-accent:     #D97706;
      --color-accent-light: #FEF3C7;
      --color-bg:         #F8FAFC;
      --color-surface:    #FFFFFF;
      --color-border:     #DBEAFE;
      --color-muted:      #E9EEF6;
      --color-text:       #0F172A;
      --color-text-muted: #64748B;
      --color-success:    #059669;
      --color-danger:     #DC2626;
      --color-purple:     #7C3AED;
      --color-teal:       #0D9488;
      --color-orange:     #EA580C;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Figtree', 'Noto Sans', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Skip link ── */
    .skip-link {
      position: absolute; left: -9999px; top: 8px;
      background: var(--color-primary); color: #fff;
      padding: 8px 16px; border-radius: var(--radius-sm);
      font-weight: 600; z-index: 9999;
    }
    .skip-link:focus { left: 8px; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1E3A8A 0%, #1E40AF 50%, #1D4ED8 100%);
      color: white;
      padding: 0 32px;
      height: 68px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(30,64,175,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    header p  { font-size: 0.78rem; opacity: 0.75; margin-top: 1px; }

    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* ── Nav ── */
    nav {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 0 32px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    nav a {
      color: var(--color-primary);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    nav a:hover { background: var(--color-muted); }
    nav a:focus-visible { outline: 3px solid var(--color-primary); outline-offset: 2px; }
    .nav-sep { color: var(--color-border); margin: 0 4px; }
    .nav-info { font-size: 0.78rem; color: var(--color-text-muted); margin-left: auto; }

    /* ── Layout ── */
    main {
      max-width: 1160px;
      margin: 32px auto;
      padding: 0 24px;
    }

    /* ── Cards ── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .card-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.01em;
    }
    .card-subtitle {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      margin-top: 1px;
    }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--color-border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      background: #F1F5F9;
      text-align: left;
      padding: 11px 14px;
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--color-border);
      white-space: nowrap;
    }
    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid #F1F5F9;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover td { background: #F8FAFC; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
      white-space: nowrap;
      line-height: 1;
    }
    .btn:focus-visible { outline: 3px solid var(--color-primary); outline-offset: 2px; }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: #1D4ED8; box-shadow: 0 4px 12px rgba(30,64,175,0.3); transform: translateY(-1px); }
    .btn-success { background: var(--color-success); color: #fff; }
    .btn-success:hover { background: #047857; box-shadow: 0 4px 12px rgba(5,150,105,0.3); transform: translateY(-1px); }
    .btn-ghost { background: var(--color-muted); color: var(--color-text); }
    .btn-ghost:hover { background: #D1D5DB; }
    .btn-sm { padding: 6px 12px; font-size: 0.78rem; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .badge-structural { background: #DBEAFE; color: #1E40AF; }
    .badge-syntactic  { background: #D1FAE5; color: #065F46; }
    .badge-semantic   { background: #FEF3C7; color: #92400E; }
    .badge-hl7   { background: #EDE9FE; color: #5B21B6; }
    .badge-fhir  { background: #ECFDF5; color: #065F46; }
    .badge-dicom { background: #FFF7ED; color: #9A3412; }

    /* ── Code / Pre ── */
    pre {
      background: #0F172A;
      color: #CBD5E1;
      border-radius: var(--radius-md);
      padding: 20px;
      font-size: 0.78rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.75;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      border: 1px solid #1E293B;
      max-height: 480px;
    }

    code {
      background: #EFF6FF;
      color: #1D4ED8;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.82em;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ── Tag row ── */
    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--color-border); margin: 20px 0; }

    /* ── Interop type block ── */
    .interop-block {
      padding: 16px 18px;
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      border-left: 4px solid transparent;
    }
    .interop-block:last-child { margin-bottom: 0; }
    .interop-structural { background: #EFF6FF; border-color: #3B82F6; }
    .interop-syntactic  { background: #F0FDF4; border-color: #10B981; }
    .interop-semantic   { background: #FFFBEB; border-color: #F59E0B; }
    .interop-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .interop-text { font-size: 0.875rem; color: #374151; line-height: 1.65; white-space: pre-line; }

    /* ── Info alert ── */
    .alert-info {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-left: 4px solid var(--color-primary);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 0.875rem;
      color: #1E3A8A;
      line-height: 1.6;
    }

    /* ── SVG icon util ── */
    .icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header>
    <div class="header-icon" aria-hidden="true">
      <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div>
      <h1>Health Interoperability Demo</h1>
      <p>COMP3342 — Cardiac Emergency Patient Journey</p>
    </div>
    <span class="header-badge">Group 8</span>
  </header>

  <nav aria-label="Primary navigation">
    <a href="/">
      <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Patients
    </a>
    <span class="nav-sep" aria-hidden="true">|</span>
    <span class="nav-info">5 Providers &nbsp;&bull;&nbsp; 5 Channels &nbsp;&bull;&nbsp; HL7 v2 &nbsp;&bull;&nbsp; FHIR R4 &nbsp;&bull;&nbsp; DICOM</span>
  </nav>

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
